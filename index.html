<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>অর্ডার ফর্ম | পণ্য অর্ডার করুন</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, 'Segoe UI', Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(145deg, #e9f0f5 0%, #f1f5f9 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .order-form {
      background: white;
      padding: 28px 26px;
      border-radius: 28px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .form-header { text-align: center; margin-bottom: 24px; }
    h2 {
      color: #1e2a47;
      font-weight: 800;
      font-size: 26px;
      border-bottom: 3px solid #ff4c3b;
      display: inline-block;
      padding-bottom: 8px;
      margin-bottom: 10px;
    }
    .info-badge {
      background: #fff3f0;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #ff4c3b;
      font-weight: 600;
      display: inline-block;
    }

    /* প্রোডাক্ট সারাংশ বক্স */
    .product-summary {
      background: #fff8f7;
      border: 1.5px solid #ffe0db;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .product-summary .pname {
      font-weight: 700;
      color: #1e2a3e;
      font-size: 1rem;
    }
    .product-summary .ptotal {
      font-weight: 800;
      color: #ff4c3b;
      font-size: 1.2rem;
    }
    .product-summary .pqty {
      font-size: 13px;
      color: #666;
      background: #f0f0f0;
      padding: 3px 10px;
      border-radius: 20px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #1e2f4e;
      font-size: 0.9rem;
    }
    .required-star::after { content: " *"; color: #e53e3e; }

    select, input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      background-color: #fefefe;
      box-sizing: border-box;
      transition: all 0.2s;
      font-family: inherit;
      color: #1e2a3e;
    }
    select:focus, input[type="text"]:focus, input[type="tel"]:focus {
      border-color: #ff4c3b;
      outline: none;
      box-shadow: 0 0 0 3px rgba(255,76,59,0.15);
    }
    input[readonly] {
      background-color: #f8fafc;
      cursor: default;
      border-color: #e2edf7;
      color: #555;
    }

    .submit-btn {
      margin-top: 28px;
      width: 100%;
      background: linear-gradient(95deg, #ff4c3b, #e03a29);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      padding: 15px;
      border-radius: 40px;
      box-shadow: 0 4px 14px rgba(255,76,59,0.35);
      transition: all 0.25s;
      font-family: inherit;
    }
    .submit-btn:hover {
      transform: scale(1.01);
      box-shadow: 0 8px 20px rgba(255,76,59,0.35);
    }
    .submit-btn:active { transform: scale(0.99); }

    @media (max-width: 500px) {
      .order-form { padding: 20px 16px; }
      h2 { font-size: 22px; }
    }

</head>

<div class="order-form">
  <div class="form-header">
    <h2>📦 অর্ডার ফর্ম</h2><br>
    <div class="info-badge">✅ ক্যাশ অন ডেলিভারি | সঠিক তথ্য দিন</div>
  </div>

  <!-- প্রোডাক্ট সারাংশ -->
  <div class="product-summary">
    <span class="pname" id="summaryName">—</span>
    <span class="pqty" id="summaryQty">—</span>
    <span class="ptotal" id="summaryPrice">—</span>
  </div>

  <form id="orderForm" action="https://formsubmit.co/amarbd00678@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="🛍️ নতুন অর্ডার জমা হয়েছে - ওয়েবসাইট থেকে">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <!-- hidden fields — ফর্ম ডেটায় যাবে -->
    <input type="hidden" id="product" name="product">
    <input type="hidden" id="totalPrice" name="totalPrice">
    <input type="hidden" id="qty" name="qty">

    <label for="name" class="required-star">পূর্ণ নাম</label>
    <input type="text" id="name" name="name" required placeholder="আপনার সম্পূর্ণ নাম লিখুন">

    <label for="phone" class="required-star">মোবাইল নাম্বার</label>
    <input type="tel" id="phone" name="phone" required placeholder="01XXXXXXXXX">

    <label for="division" class="required-star">বিভাগ</label>
    <select id="division" name="division" required>
      <option value="">-- বিভাগ নির্বাচন করুন --</option>
      <option>ঢাকা</option><option>রংপুর</option><option>ময়মনসিংহ</option>
      <option>চট্টগ্রাম</option><option>রাজশাহী</option><option>খুলনা</option>
      <option>বরিশাল</option><option>সিলেট</option>
    </select>

    <label for="district" class="required-star">জেলা</label>
    <select id="district" name="district" required disabled>
      <option value="">-- জেলা নির্বাচন করুন --</option>
    </select>

    <label for="thana" class="required-star">থানা / উপজেলা</label>
    <select id="thana" name="thana" required disabled>
      <option value="">-- থানা/উপজেলা নির্বাচন করুন --</option>
    </select>

    <label for="village" class="required-star">গ্রাম / বিস্তারিত ঠিকানা</label>
    <input type="text" id="village" name="village" required placeholder="বাড়ির নাম / রাস্তা / গ্রাম">

    <label for="pickup" class="required-star">সংগ্রহের স্থান</label>
    <input type="text" id="pickup" name="pickup" required placeholder="কুরিয়ার পয়েন্ট / অফিসের নাম">

    <button type="submit" class="submit-btn">✅ অর্ডার কনফার্ম করুন</button>
  </form>
</div>

  // ==================== URL থেকে পণ্যের তথ্য ====================
  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const name  = params.get('product') || params.get('name') || 'পণ্য নির্বাচিত হয়নি';
    const price = params.get('price') || '০';
    const qty   = params.get('qty')   || '১';

    // hidden fields এ সেট (ফর্মে যাবে)
    document.getElementById('product').value    = name;
    document.getElementById('totalPrice').value = price;
    document.getElementById('qty').value        = qty;

    // সারাংশ বক্সে দেখাবে
    document.getElementById('summaryName').innerText  = name;
    document.getElementById('summaryQty').innerText   = `পরিমাণ: ${qty}`;
    document.getElementById('summaryPrice').innerText = `মোট: ৳${parseInt(price).toLocaleString()}`;

    districtSelect.disabled = true;
    thanaSelect.disabled = true;
  });

  // ==================== বিভাগ → জেলা → থানা ====================
  const divisionSelect = document.getElementById('division');
  const districtSelect = document.getElementById('district');
  const thanaSelect    = document.getElementById('thana');

  divisionSelect.addEventListener('change', function () {
    const div = this.value;
    districtSelect.innerHTML = '<option value="">-- জেলা নির্বাচন করুন --</option>';
    thanaSelect.innerHTML    = '<option value="">-- থানা/উপজেলা নির্বাচন করুন --</option>';
    thanaSelect.disabled     = true;

    if (div && data[div]) {
      Object.keys(data[div]).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        districtSelect.appendChild(opt);
      });
      districtSelect.disabled = false;
    } else {
      districtSelect.disabled = true;
    }
  });

  districtSelect.addEventListener('change', function () {
    const div = divisionSelect.value;
    const dist = this.value;
    thanaSelect.innerHTML = '<option value="">-- থানা/উপজেলা নির্বাচন করুন --</option>';

    if (div && dist && data[div]?.[dist]) {
      data[div][dist].forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        thanaSelect.appendChild(opt);
      });
      thanaSelect.disabled = false;
    } else {
      thanaSelect.disabled = true;
    }
  });

  // ==================== ফর্ম ভ্যালিডেশন ====================
  document.getElementById('orderForm').addEventListener('submit', function (e) {
    // নাম চেক
    if (!document.getElementById('name').value.trim()) {
      alert('⚠️ পূর্ণ নাম লিখুন।');
      document.getElementById('name').focus();
      e.preventDefault(); return;
    }

    // ফোন চেক
    const phone = document.getElementById('phone').value.trim().replace(/\D/g, '');
    if (phone.length < 10 || phone.length > 14) {
      alert('📱 সঠিক মোবাইল নাম্বার দিন (01XXXXXXXXX)');
      document.getElementById('phone').focus();
      e.preventDefault(); return;
    }

    // বিভাগ/জেলা/থানা চেক
    if (!divisionSelect.value || !districtSelect.value || !thanaSelect.value) {
      alert('📍 সম্পূর্ণ ঠিকানা (বিভাগ, জেলা, থানা) নির্বাচন করুন।');
      e.preventDefault(); return;
    }

    // গ্রাম/ঠিকানা চেক
    if (!document.getElementById('village').value.trim()) {
      alert('🏠 বিস্তারিত ঠিকানা লিখুন।');
      document.getElementById('village').focus();
      e.preventDefault(); return;
    }

    // পিকআপ চেক
    if (!document.getElementById('pickup').value.trim()) {
      alert('📦 সংগ্রহের স্থান লিখুন।');
      document.getElementById('pickup').focus();
      e.preventDefault(); return;
    }
  });
</script>
