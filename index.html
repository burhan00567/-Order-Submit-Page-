    }
    .order-form {
      background: white;
      padding: 28px 30px;
      border-radius: 28px;
      max-width: 650px;
      width: 100%;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #1e2a47;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.2px;
      border-bottom: 3px solid #0077ff;
      display: inline-block;
      width: auto;
      padding-bottom: 8px;
    }
    .form-header {
      text-align: center;
      margin-bottom: 25px;
    }
    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 7px;
      font-weight: 600;
      color: #1e2f4e;
      font-size: 0.95rem;
    }
    select, input[type="text"], input[type="tel"], input[type="submit"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border-radius: 16px;
      border: 1.5px solid #e2e8f0;
      background-color: #fefefe;
      box-sizing: border-box;
      transition: all 0.2s;
      font-family: inherit;
    }
    select:focus, input[type="text"]:focus, input[type="tel"]:focus {
      border-color: #0077ff;
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 119, 255, 0.2);
      background-color: #fff;
    }
    input[readonly] {
      background-color: #f8fafc;
      cursor: default;
      border-color: #e2edf7;
      color: #1e2a47;
      font-weight: 500;
    }
    input[type="submit"] {
      margin-top: 30px;
      background: linear-gradient(95deg, #0077ff, #0056cc);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0, 119, 255, 0.3);
      border-radius: 40px;
      padding: 14px;
    }
    input[type="submit"]:hover {
      background: linear-gradient(95deg, #0066e6, #0047b3);
      transform: scale(1.01);
      box-shadow: 0 8px 18px rgba(0, 85, 204, 0.3);
    }
    .required-star::after {
      content: " *";
      color: #e53e3e;
      font-weight: bold;
    }

      margin-bottom: 5px;
    }

      <option value="">-- জেলা নির্বাচন করুন --</option>
    </select>

      <option value="">-- থানা/উপজেলা নির্বাচন করুন --</option>

    <input type="text" id="village" name="village" required placeholder="বাড়ির নাম/রাস্তা/গ্রাম" />

    <input type="text" id="pickup" name="pickup" required placeholder="কুরিয়ার পয়েন্ট / অফিসের নাম" />

  // DOM elements
  const divisionSelect = document.getElementById("division");
  const districtSelect = document.getElementById("district");

  // URL parameter থেকে প্রোডাক্ট, মূল্য ও পরিমাণ সেট করা
  window.addEventListener('DOMContentLoaded', () => {
    districtSelect.disabled = true;
    thanaSelect.disabled = true;

    const urlParams = new URLSearchParams(window.location.search);

// 👉 এখানে তুমি আগে যেটা পাঠাচ্ছো সেটার সাথে মিল রাখতে হবে
const product = urlParams.get('name');   // ❗ name (product না)
const price = urlParams.get('price');
const qty = urlParams.get('qty');

if (product) {
  document.getElementById('product').value = product;
}

if (price) {
  document.getElementById('totalPrice').value = price;
}

if (qty) {
  document.getElementById('qty').value = qty;
}

    // ফিল্ড যদি ফাঁকা থাকে তাহলে ইউজার বুঝতে পারে (কোয়েরি স্ট্রিং ছাড়া পেজ খুললে)
    if (!product) document.getElementById('product').value = "পণ্য নির্বাচিত হয়নি";
    if (!price) document.getElementById('totalPrice').value = "০";
    if (!qty) document.getElementById('qty').value = "১";
  });

  // বিভাগ পরিবর্তনে জেলা লোড
  divisionSelect.addEventListener("change", function() {
    const division = this.value;
    districtSelect.innerHTML = '<option value="">-- জেলা নির্বাচন করুন --</option>';
    thanaSelect.innerHTML = '<option value="">-- থানা/উপজেলা নির্বাচন করুন --</option>';
    thanaSelect.disabled = true;

    if (division && data[division]) {
      Object.keys(data[division]).forEach(district => {
        const option = document.createElement("option");
        option.value = district;
        option.textContent = district;
        districtSelect.appendChild(option);
      });
      districtSelect.disabled = false;
    } else {
      districtSelect.disabled = true;
      districtSelect.innerHTML = '<option value="">-- জেলা নির্বাচন করুন --</option>';
    }
  });

  // জেলা পরিবর্তনে থানা লোড
  districtSelect.addEventListener("change", function() {
    const division = divisionSelect.value;
    const district = this.value;
    thanaSelect.innerHTML = '<option value="">-- থানা/উপজেলা নির্বাচন করুন --</option>';

    if (division && district && data[division] && data[division][district]) {
      data[division][district].forEach(thana => {
        const option = document.createElement("option");
        option.value = thana;
        option.textContent = thana;
        thanaSelect.appendChild(option);
      });
      thanaSelect.disabled = false;
    } else {
      thanaSelect.disabled = true;
    }
  });

  // ফাইনাল সাবমিটের আগে সম্পূর্ণ ভ্যালিডেশন (readonly সহ সব ফিল্ড, থানা/জেলা সিলেক্টেড)
  document.getElementById('orderForm').addEventListener('submit', function(e) {
    const fields = [
      { id: 'product', name: 'প্রোডাক্টের নাম' },
      { id: 'totalPrice', name: 'মোট দাম' },
      { id: 'qty', name: 'পরিমাণ' },
      { id: 'name', name: 'পূর্ণ নাম' },
      { id: 'phone', name: 'মোবাইল নাম্বার' },
      { id: 'division', name: 'বিভাগ' },
      { id: 'district', name: 'জেলা' },
      { id: 'thana', name: 'থানা/উপজেলা' },
      { id: 'village', name: 'গ্রাম / বিস্তারিত ঠিকানা' },
      { id: 'pickup', name: 'সংগ্রহের স্থান' }
    ];

    for (const field of fields) {
      const el = document.getElementById(field.id);
      if (!el) continue;
      let value = '';
      if (el.tagName === 'SELECT') {
        value = el.options[el.selectedIndex]?.value || '';
      } else {
        value = el.value.trim();
      }
      if (!value) {
        alert(`⚠️ ${field.name} অবশ্যই পূরণ করতে হবে।`);
        el.focus();
        e.preventDefault();
        return;
      }
    }

    // মোবাইল নাম্বার মোটামুটি 11 ডিজিটের কিনা বেসিক চেক
    const phoneVal = document.getElementById('phone').value.trim();
    const phoneDigits = phoneVal.replace(/\D/g, '');
    if (phoneDigits.length < 10 || phoneDigits.length > 14) {
      alert('📱 সঠিক মোবাইল নাম্বার দিন (০১XXXXXXXXX ফরম্যাটে)');
      document.getElementById('phone').focus();
      e.preventDefault();
      return;
    }

    // জেলা ও থানা সিলেক্টেড কিনা নিশ্চিত (select মানে value অবশ্যই সেট)
    if (!divisionSelect.value || !districtSelect.value || !thanaSelect.value) {
      alert('দয়া করে সম্পূর্ণ ঠিকানা (বিভাগ, জেলা, থানা) নির্বাচন করুন');
      e.preventDefault();
      return;
    }

    // সব ঠিক থাকলে ফর্ম Submit হবে FormSubmit এ
  });
</script>
